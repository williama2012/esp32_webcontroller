<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"

  <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.6/underscore-umd-min.js"></script>
  <script src="index.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/fontawesome.min.css"
    integrity="sha384-BY+fdrpOd3gfeRvTSMT+VUZmA728cfF9Z2G42xpaRkUGu2i3DyzpTURDo5A6CaLK" crossorigin="anonymous">

  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />

<body class="terminal-body">
  <div class="terminal-container">
    <div class="terminal-history-container">
      <table id="terminal-history" class="terminal-history"></table>
    </div>
    <div class="terminal-input-container">
      <div class="terminal-input-textarea">
        <textarea class="terminal-input" id="terminal-input" rows="8" cols="96"></textarea>
      </div>
      <div class="terminal-input-sidebar">
        <i class="bi bi-save terminal-input-load" ></i>
        <input type="checkbox" class="terminal-input-enter" id="terminal-input-enter" />
      </div>
    </div>
  </div>
</body>
</html>
